<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Jana | Personal Blog</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif
        }

        body {
            background: linear-gradient(120deg, #4facfe, #00f2fe);
            color: #333
        }

        header {
            background: white;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1)
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            color: #0077ff
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #333;
            font-weight: 500
        }

        nav a:hover {
            color: #0077ff
        }

        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 10px
        }

        .hero p {
            font-size: 20px;
            max-width: 600px
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: white;
            color: #0077ff;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer
        }

        .btn:hover {
            background: #f0f0f0
        }

        .section {
            padding: 60px 10%;
            background: white
        }

        .section h2 {
            text-align: center;
            margin-bottom: 40px
        }

        .posts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px
        }

        .post {
            background: #f7f7f7;
            padding: 20px;
            border-radius: 10px;
            transition: 0.3s
        }

        .post:hover {
            transform: translateY(-5px)
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 28px
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">Deep Jana</div>
        <nav>
            <a href="about.html" target="_blank">About</a>
            <a href="contact.html" target="_blank">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Welcome to My Blog</h1>
        <p>Hi, I'm Deep Jana. I share articles about education, technology, ideas, and things I learn every day.</p>
        <a href="blog.html" target="_blank"><button class="btn">Read My Blog</button></a>

    </section>
    </section>



    <footer>

        <p>© 2026 Deep Jana | Personal Blog </p>

    </footer>

</body>

</html>
